<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noNotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <script>
        // Inline script to prevent theme flash
        (function () {
            const theme = localStorage.getItem('theme');
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();
    </script>
</head>

<body>

    <div id="app">
        <div id="main-content">
            <!-- Header Banner -->
            <header id="main-header">
                <div class="logo-container">
                    <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="logo-text">no-Notes</span>
                </div>

                <div class="header-actions">
                    <!-- Search Button -->
                    <button id="btn-search" aria-label="Focus search" title="Search (Cmd+F)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                    <!-- History Button -->
                    <button id="btn-history" aria-label="View history" title="View history (Cmd+H)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                            <path d="M12 7v5l4 2"></path>
                        </svg>
                    </button>

                    <!-- Add Note Button -->
                    <button id="btn-add-note" aria-label="Add note" title="Add note" onclick="window.addNewNote()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>


                    <!-- Theme Toggle -->
                    <button id="btn-theme" aria-label="Toggle theme">
                        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>

                    <!-- Toggle Sidebar (Hamburger) -->
                    <button id="btn-open-sidebar" aria-label="Open sidebar" title="Open sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </header>

            <div id="main-workspace">
                <!-- Editor -->
                <div id="editor-container"></div>
            </div>
        </div>

        <!-- Side Panel (Permanent, Full Vertical) -->
        <aside id="side-panel">
            <div class="side-panel-header" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; justify-content: flex-end;">
                    <button id="btn-close-sidebar" aria-label="Close sidebar" title="Close sidebar" style="background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; padding: 4px;">✕</button>
                </div>
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Filter notes..." autocomplete="off">
                    <button id="btn-clear-search" aria-label="Clear search" title="Clear search" style="background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; padding: 0 4px;">✕</button>
                    <span id="search-count" style="margin-left: 4px;">0 results</span>
                </div>
            </div>

            <!-- Calendar Widget -->
            <div id="calendar-widget">
                <div class="calendar-header">
                    <button id="cal-prev" class="cal-btn">❮</button>
                    <span id="cal-month-year"></span>
                    <button id="cal-next" class="cal-btn">❯</button>
                </div>
                <div class="calendar-grid-header">
                    <div>S</div>
                    <div>M</div>
                    <div>T</div>
                    <div>W</div>
                    <div>T</div>
                    <div>F</div>
                    <div>S</div>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>

            <div id="task-panel-header">
                <span id="task-panel-title">To Do</span>
            </div>
            <div id="task-list" hx-get="/tasks" hx-trigger="load, update-tasks">
            </div>
        </aside>
    </div>


    <div id="history-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content history-modal-content">
            <div class="modal-header">
                <h3>Note History</h3>
                <button id="history-close" class="btn-icon">✕</button>
            </div>
            <div class="modal-body history-body">
                <div id="history-list">
                    <!-- History entries will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <div id="date-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Edit Line Dates</h3>
            <div class="modal-body">
                <div class="input-group">
                    <label>Created Date</label>
                    <input type="date" id="edit-created-at">
                </div>
                <div class="input-group">
                    <label>Modified Date</label>
                    <input type="date" id="edit-modified-at">
                </div>
                <p id="edit-line-info"></p>
            </div>
            <div class="modal-actions">
                <button id="edit-cancel" class="btn-secondary">Cancel</button>
                <button id="edit-save" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/editor.js"></script>

    <script>
        // ... previous scripts ...
        let editingLineNum = null;

        window.openDateModal = async (lineNum) => {
            editingLineNum = lineNum;
            try {
                const res = await fetch(`/line/get?line=${lineNum}`);
                const data = await res.json();

                // Convert unix timestamps to YYYY-MM-DD (Local Time)
                const toDateStr = (ts) => {
                    const d = new Date(ts * 1000);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                };

                document.getElementById('edit-created-at').value = toDateStr(data.created_at);
                document.getElementById('edit-modified-at').value = toDateStr(data.timestamp);
                document.getElementById('edit-line-info').textContent = `Editing Line ${lineNum}: "${data.text.substring(0, 30)}..."`;

                document.getElementById('date-modal').style.display = 'flex';
            } catch (e) {
                console.error("Failed to load line data", e);
            }
        };

        document.getElementById('edit-cancel').onclick = () => {
            document.getElementById('date-modal').style.display = 'none';
        }

        document.getElementById('edit-save').onclick = async () => {
            const parseLocalDate = (dateStr) => {
                if (!dateStr) return 0;
                const parts = dateStr.split('-');
                return new Date(parts[0], parts[1] - 1, parts[2]).getTime() / 1000;
            };

            const createdAt = parseLocalDate(document.getElementById('edit-created-at').value);
            const modifiedAt = parseLocalDate(document.getElementById('edit-modified-at').value);

            const formData = new URLSearchParams();
            formData.append('line', editingLineNum);
            formData.append('created_at', Math.floor(createdAt));
            formData.append('modified_at', Math.floor(modifiedAt));

            try {
                const res = await fetch('/line/update-date', {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    document.getElementById('date-modal').style.display = 'none';
                    fetchActivity(); // Refresh calendar
                    // Also trigger a refresh of the hover labels in editor if possible (though repo history reload will do it)
                    if (window.dispatchEvent) window.dispatchEvent(new Event('update'));
                }
            } catch (e) {
                console.error("Failed to update line", e);
            }
        }

        const searchInput = document.getElementById('search-input');

        document.getElementById('btn-clear-search').addEventListener('click', () => {
            if (window.clearSearch) window.clearSearch();
        });


        // Theme switching logic
        const btnTheme = document.getElementById('btn-theme');
        btnTheme.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let nextTheme = 'dark';

            // If current is dark or unset but prefers-color-scheme is dark
            if (currentTheme === 'dark' || (!currentTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                nextTheme = 'light';
            }

            document.documentElement.setAttribute('data-theme', nextTheme);
            localStorage.setItem('theme', nextTheme);
        });

        // Sidebar Toggle Logic
        const btnOpenSidebar = document.getElementById('btn-open-sidebar');
        const btnCloseSidebar = document.getElementById('btn-close-sidebar');

        btnOpenSidebar.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.body.classList.add('sidebar-open-mobile');
            } else {
                document.body.classList.remove('sidebar-closed');
            }
        });

        btnCloseSidebar.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.body.classList.remove('sidebar-open-mobile');
            } else {
                document.body.classList.add('sidebar-closed');
            }
        });

        // Expose close handler for editor navigations on mobile
        window.closeMobileSidebar = () => {
            if (window.innerWidth <= 768) {
                document.body.classList.remove('sidebar-open-mobile');
            }
        };

        // Search button logic
        const btnSearch = document.getElementById('btn-search');

        btnSearch.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                document.body.classList.add('sidebar-open-mobile');
            } else {
                document.body.classList.remove('sidebar-closed');
            }
            searchInput.focus();
            searchInput.select();
        });

        // Global Cmd-F shortcut to focus search (Capture phase to override CodeMirror)
        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
                e.preventDefault();
                e.stopPropagation();
                if (window.innerWidth <= 768) {
                    document.body.classList.add('sidebar-open-mobile');
                } else {
                    document.body.classList.remove('sidebar-closed');
                }
                searchInput.focus();
                searchInput.select();
            }
        }, true);

        // ─── Calendar Logic ──────────────────────────────────────────────
        let currentCalDate = new Date();
        let activityData = { created: {}, modified: {} };
        window.activityDates = {}; // For testing


        function computeActivity() {
            const activity = { created: {}, modified: {} };
            const data = window.timelineData || [];
            
            data.forEach(row => {
                if (!row.text || !row.text.trim()) return;
                
                // Helper to get local YYYY-MM-DD
                const getLocalISO = (ts) => {
                    if (!ts) return null;
                    const d = new Date(ts * 1000);
                    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                };

                const creStr = getLocalISO(row.created_at);
                const modStr = getLocalISO(row.timestamp);

                if (creStr && (activity.created[creStr] === undefined || row.line_num < activity.created[creStr])) {
                    activity.created[creStr] = row.line_num;
                }
                if (modStr && (activity.modified[modStr] === undefined || row.line_num < activity.modified[modStr])) {
                    activity.modified[modStr] = row.line_num;
                }
            });
            
            // Populate test helper
            window.activityDates = {};
            for (const d in activity.created) window.activityDates[d] = activity.created[d];
            for (const d in activity.modified) {
                if (window.activityDates[d] === undefined) window.activityDates[d] = activity.modified[d];
            }
            
            return activity;
        }

        function fetchActivity() {
            activityData = computeActivity();
            renderCalendar();
        }

        let lastActivityHash = "";
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthYearLabel = document.getElementById('cal-month-year');
            
            if (!grid || !monthYearLabel) return;

            // Prevent flicker by checking if data actually changed
            const currentHash = JSON.stringify(activityData) + currentCalDate.getMonth() + currentCalDate.getFullYear();
            if (currentHash === lastActivityHash) return;
            lastActivityHash = currentHash;

            grid.innerHTML = '';

            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth();
            const monthLabel = currentCalDate.toLocaleString('default', { month: 'long' });
            monthYearLabel.textContent = `${monthLabel} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Padding for first day of month
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                dayDiv.textContent = d;

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                const createdLine = activityData.created[dateStr];
                const modifiedLine = activityData.modified[dateStr];

                if (createdLine !== undefined) {
                    dayDiv.classList.add('has-creation');
                    dayDiv.classList.add('has-activity'); // For test mapping
                    dayDiv.title = `Activity on ${dateStr}`;
                } else if (modifiedLine !== undefined) {
                    dayDiv.classList.add('has-modification');
                    dayDiv.classList.add('has-activity'); // For test mapping
                    dayDiv.title = `Activity on ${dateStr}`;
                }

                if (createdLine !== undefined || modifiedLine !== undefined) {
                    dayDiv.onclick = () => {
                        const lineNum = createdLine !== undefined ? createdLine : modifiedLine;
                        if (window.scrollToLine) {
                            window.scrollToLine(lineNum);
                        }
                    };
                }

                grid.appendChild(dayDiv);
            }
        }

        document.getElementById('cal-prev').onclick = () => {
            currentCalDate.setMonth(currentCalDate.getMonth() - 1);
            renderCalendar();
        };
        document.getElementById('cal-next').onclick = () => {
            currentCalDate.setMonth(currentCalDate.getMonth() + 1);
            renderCalendar();
        };

        fetchActivity();

        // Register with HTMX to refresh activity on note changes
        document.body.addEventListener('htmx:afterOnLoad', (e) => {
            // If the event came from an append or update
            if (e.detail.requestConfig.path === '/append' || e.detail.requestConfig.path === '/update') {
                fetchActivity();
            }
        });

        // The SSE events should also trigger calendar refresh
        document.body.addEventListener('update', fetchActivity);
    </script>
</body>

</html>
